<!DOCTYPE html>
<!--
  WebAssembly HTTP Server — Terminal UI
  ======================================

  This page loads the Go HTTP server as a WebAssembly binary and provides a
  terminal-emulator interface for making curl-style HTTP requests to the
  server running entirely in the browser.

  Architecture:
  1. wasm_exec.js (Go's official JS glue) bootstraps the Go WASM runtime
  2. main.wasm is fetched and instantiated, which registers handleHTTPRequest()
  3. A Service Worker (sw.js) intercepts fetch() requests and routes them to Go
  4. The terminal UI parses curl commands, calls fetch(), and displays responses

  The server does NOT open any real TCP ports. The URL "localhost:42069" in the
  terminal is simulated — requests are routed internally through the Service
  Worker to the Go WASM handler.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Go HTTP Server — WebAssembly Terminal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Terminal window chrome -->
  <div class="title-bar">
    <span class="dot dot-red"></span>
    <span class="dot dot-yellow"></span>
    <span class="dot dot-green"></span>
    <span class="title">Go HTTP Server — WebAssembly Terminal</span>
  </div>

  <div class="split-container">
    <!-- Left Pane: Client Terminal -->
    <div class="terminal-pane">
      <div class="pane-title">Client (curl)</div>
      <div id="terminal"></div>
      <div class="input-area">
        <span class="prompt-symbol">$</span>
        <input
          type="text"
          id="command-input"
          placeholder="Loading server..."
          disabled
          autocomplete="off"
          spellcheck="false"
        />
      </div>
    </div>

    <!-- Right Pane: Server Logs -->
    <div class="terminal-pane right-pane">
      <div class="pane-title">Server Logs (WASM Output)</div>
      <div id="logs-terminal"></div>
    </div>
  </div>

  <!--
    wasm_exec.js — Go's official WebAssembly support file.
    This file is copied from $(go env GOROOT)/misc/wasm/wasm_exec.js during
    the build process (make wasm-setup). It provides the Go class that
    bootstraps the Go runtime inside the browser.
  -->
  <script src="wasm_exec.js"></script>

  <!--
    register-sw.js — Service Worker registration helper.
    Registers sw.js and provides waitForServiceWorker() which resolves
    when the Service Worker is active and controlling this page.
  -->
  <script src="register-sw.js"></script>

  <script src="terminal.js"></script>
</body>
</html>
